[metadata]
name = "2000s Metalcore"
description = "Aggressive drum transient restoration, cymbal taming, bass recovery"

[drums]
transient_attack_db = 3.0
transient_sustain_db = 0.0
expander_threshold_db = -45.0
expander_ratio = 1.15
high_shelf_gain_db = -2.0
high_shelf_freq_hz = 9000.0
low_shelf_gain_db = 1.0
low_shelf_freq_hz = 80.0

[vocals]
deesser_freq_low_hz = 6500.0
deesser_freq_high_hz = 9000.0
expander_ratio = 1.2
presence_gain_db = 5.0
presence_freq_hz = 3500.0
level_adjust_db = 2.0

[bass]
hp_freq_hz = 45.0
mud_cut_freq_hz = 220.0
mud_cut_gain_db = -4.0
mud_cut_q = 0.9
harmonic_freq_hz = 700.0
harmonic_gain_db = 2.5
comp_ratio = 2.0
comp_attack_ms = 30.0

[other]
mid_boost_low_hz = 1500.0
mid_boost_high_hz = 5000.0
mid_boost_gain_db = 4.0
high_shelf_gain_db = 0.0
high_shelf_freq_hz = 10000.0
stereo_width = 1.15

# Raw mix values are authored as (tuning_target_db / global.intensity) so
# that `effective_mix` scaling in Pipeline.run produces the intended audible
# balance at the default intensity of 0.35. The listening targets were:
#   drums +1.5 dB, vocals +2.0 dB, bass +1.0 dB, other +2.5 dB
# At intensity=0.35 these become:
#   drums 4.285714, vocals 5.714286, bass 2.857143, other 7.142857
# If you change `global.intensity` below, you must re-author these raw
# values to preserve the listening-approved balance (or accept a new one).
[mix]
drums_db = 4.285714
vocals_db = 5.714286
bass_db = 2.857143
other_db = 7.142857

[global]
intensity = 0.35
target_lufs = -14.0
target_true_peak_dbtp = -1.0
gate_threshold_db = -40.0
